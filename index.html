<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔍 Freeloader Detective</title>
  <style>
    /* ============================================
       GLOBAL STYLES - dark theme like Among Us
    ============================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    /* ============================================
       HEADER - title and sponsor badges
    ============================================ */
    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .header h1 {
      font-size: 2.4rem;
      color: #ff4757;
      text-shadow: 0 0 30px rgba(255,71,87,0.4);
      margin-bottom: 8px;
    }
    .header p {
      color: #888;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    /* Sponsor badges shown under the title */
    .sponsor-badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .sponsor-badge {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      color: #aaa;
    }

    /* ============================================
       INPUT AREA - where user pastes GitHub URL
    ============================================ */
    .input-area {
      max-width: 620px;
      margin: 24px auto;
      padding: 0 20px;
    }
    .input-area input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1.5px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
    }
    .input-area input:focus {
      border-color: #ff4757;
    }
    .input-area input::placeholder {
      color: #555;
    }
    .input-area button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      background: #ff4757;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .input-area button:hover {
      background: #ff6b81;
      transform: scale(1.02);
    }
    .input-area button:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
    }

    /* ============================================
       STATUS BAR - shows which AI step is running
    ============================================ */
    .status {
      text-align: center;
      color: #ffa502;
      margin: 12px 20px;
      font-size: 0.95rem;
      min-height: 28px;
      font-weight: 500;
    }

    /* ============================================
       RESULTS AREA - everything shown after scan
    ============================================ */
    .results {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* Summary box at the top of results */
    .summary-box {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 24px;
    }
    .summary-box h2 {
      color: #ffa502;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }
    .summary-box p {
      color: #ccc;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .impostor-alert {
      color: #ff4757;
      font-weight: 700;
      margin-top: 10px;
      font-size: 1rem;
    }
    .all-clear {
      color: #2ed573;
      font-weight: 700;
      margin-top: 10px;
    }

    /* Sponsors used row inside summary */
    .sponsors-used {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #555;
    }
    .sponsors-used span {
      color: #666;
      background: #12121f;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 2px 10px;
      margin-right: 6px;
    }

    /* ============================================
       MEMBER CARDS GRID - one card per teammate
    ============================================ */
    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    /* Base card style */
    .member-card {
      background: #1a1a2e;
      border-radius: 14px;
      padding: 22px;
      border: 2px solid #2a2a3e;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .member-card:hover {
      transform: translateY(-3px);
    }

    /* Card border colors based on verdict */
    .member-card.impostor {
      border-color: #ff4757;
      box-shadow: 0 0 24px rgba(255,71,87,0.25);
    }
    .member-card.suspicious {
      border-color: #ffa502;
      box-shadow: 0 0 14px rgba(255,165,2,0.15);
    }
    .member-card.innocent {
      border-color: #2ed573;
    }

    /* Name and verdict badge */
    .member-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .verdict-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .badge-IMPOSTOR  { background: #ff4757; color: #fff; }
    .badge-SUSPICIOUS { background: #ffa502; color: #000; }
    .badge-INNOCENT  { background: #2ed573; color: #000; }

    /* Big suspicion score number */
    .score-number {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }
    .score-label {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 8px;
      margin-top: 2px;
    }

    /* Score progress bar */
    .score-bar-bg {
      background: #2a2a3e;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 14px;
    }
    .score-bar {
      height: 10px;
      border-radius: 8px;
      transition: width 1.2s ease;
    }
    .bar-red    { background: linear-gradient(90deg, #ff6b6b, #ff4757); }
    .bar-orange { background: linear-gradient(90deg, #ffd89b, #ffa502); }
    .bar-green  { background: linear-gradient(90deg, #96fbc4, #2ed573); }

    /* Stats row - commits, lines, last commit */
    .stats {
      font-size: 0.85rem;
      color: #666;
      line-height: 2;
    }
    .stats span {
      color: #bbb;
      font-weight: 600;
    }

    /* Evidence sentence at bottom of card */
    .evidence {
      margin-top: 12px;
      font-size: 0.83rem;
      color: #888;
      font-style: italic;
      border-top: 1px solid #2a2a3e;
      padding-top: 10px;
      line-height: 1.5;
    }

    /* ============================================
       IMPOSTOR STAMP ANIMATION
       Red diagonal stamp that appears on
       freeloader cards after a short delay
    ============================================ */
    .stamp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg) scale(0);
      background: rgba(255, 71, 87, 0.12);
      border: 4px solid #ff4757;
      color: #ff4757;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 8px 18px;
      border-radius: 6px;
      letter-spacing: 3px;
      pointer-events: none;
      opacity: 0;
    }
    .stamp.show {
      animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      animation-delay: 0.8s;
    }
    @keyframes stampIn {
      to {
        transform: translate(-50%, -50%) rotate(-15deg) scale(1);
        opacity: 1;
      }
    }

    /* ============================================
       DOWNLOAD BUTTON
       Shown after results to download report
    ============================================ */
    .download-btn {
      display: block;
      text-align: center;
      margin: 28px auto 0;
      max-width: 320px;
      padding: 14px 28px;
      background: #2ed573;
      color: #000;
      font-weight: 700;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .download-btn:hover {
      background: #7bed9f;
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <!-- ============================================
       HEADER SECTION
  ============================================ -->
  <div class="header">
    <h1>🔍 Freeloader Detective</h1>
    <p>Among Us-style AI audit for group project freeloaders</p>

    <!-- Shows which sponsors are powering the app -->
    <div class="sponsor-badges">
      <span class="sponsor-badge">⚡ Daytona Sandbox</span>
      <span class="sponsor-badge">🌐 Bright Data</span>
      <span class="sponsor-badge">🔀 TokenRouter</span>
      <span class="sponsor-badge">🤖 Kimi AI</span>
    </div>
  </div>

  <!-- ============================================
       INPUT SECTION - user pastes GitHub URL here
  ============================================ -->
  <div class="input-area">
    <input
      type="text"
      id="repoUrl"
      placeholder="Paste GitHub repo URL — e.g. https://github.com/team/project"
    />
    <button id="analyzeBtn" onclick="analyze()">
      🔍 Investigate for Freeloaders
    </button>
  </div>

  <!-- Status bar shows which AI step is currently running -->
  <div class="status" id="status"></div>

  <!-- Results appear here after analysis -->
  <div class="results" id="results"></div>


  <script>
    // ============================================
    // MAIN ANALYZE FUNCTION
    // Runs when user clicks the Investigate button
    // ============================================
    async function analyze() {
      const repoUrl = document.getElementById('repoUrl').value.trim();

      // Make sure user actually typed something
      if (!repoUrl) {
        alert('Please paste a GitHub repo URL first!');
        return;
      }

      const btn = document.getElementById('analyzeBtn');
      const status = document.getElementById('status');
      const results = document.getElementById('results');

      // Disable button and clear old results
      btn.disabled = true;
      results.innerHTML = '';

      // ============================================
      // STEP MESSAGES
      // These cycle through while the AI is working
      // Shows judges exactly which sponsors are running
      // ============================================
      const steps = [
        '🔐 Daytona: spinning up secure sandbox...',
        '📂 Daytona: cloning repo and extracting git history...',
        '🌐 Bright Data: scraping GitHub contributor page...',
        '🔀 TokenRouter: routing request to Kimi AI...',
        '🕵️ Kimi AI: analysing contribution patterns...',
        '⚖️ Kimi AI: calculating Suspicion Scores...',
        '📄 Generating Evidence Dossier...'
      ];

      // Cycle through step messages every 900ms
      let stepIndex = 0;
      const stepInterval = setInterval(() => {
        if (stepIndex < steps.length) {
          status.textContent = steps[stepIndex++];
        }
      }, 900);

      try {
        // Call our backend server
        const res = await fetch('http://localhost:3000/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repoUrl })
        });

        const data = await res.json();

        // Stop cycling through steps
        clearInterval(stepInterval);

        if (!data.success) throw new Error(data.error);

        status.textContent = '✅ Investigation complete!';
        renderResults(data.analysis);

      } catch (err) {
        clearInterval(stepInterval);
        status.textContent = '❌ Error: ' + err.message;
        btn.disabled = false;
      }
    }

    // ============================================
    // RENDER RESULTS FUNCTION
    // Takes the analysis JSON and builds the
    // cards, scores, and impostor stamps
    // ============================================
    function renderResults(data) {
      document.getElementById('analyzeBtn').disabled = false;

      // Find all impostors to show in the alert
      const impostors = data.members.filter(m => m.verdict === 'IMPOSTOR');

      // Sort members by suspicion score - worst first
      const sorted = [...data.members].sort((a, b) => b.suspicionScore - a.suspicionScore);

      // Build the summary box HTML
      let html = `
        <div class="summary-box">
          <h2>📋 Detective Report — ${data.projectName || 'Project Audit'}</h2>
          <p>${data.summary}</p>
          ${impostors.length > 0
            ? `<p class="impostor-alert">🚨 ${impostors.length} IMPOSTOR(S) DETECTED: ${impostors.map(m => m.name).join(', ')}</p>`
            : `<p class="all-clear">✅ No clear freeloaders detected.</p>`
          }
          <div class="sponsors-used">
            Powered by:
            ${(data.sponsorsUsed || []).map(s => `<span>${s}</span>`).join('')}
          </div>
        </div>
        <div class="members-grid">
      `;

      // Build one card per member
      sorted.forEach(member => {
        // Card CSS class based on verdict
        const cardClass = member.verdict === 'IMPOSTOR' ? 'impostor'
                        : member.verdict === 'SUSPICIOUS' ? 'suspicious'
                        : 'innocent';

        // Score bar color based on score
        const barClass = member.suspicionScore >= 70 ? 'bar-red'
                       : member.suspicionScore >= 40 ? 'bar-orange'
                       : 'bar-green';

        // Score number color
        const scoreColor = member.suspicionScore >= 70 ? '#ff4757'
                         : member.suspicionScore >= 40 ? '#ffa502'
                         : '#2ed573';

        html += `
          <div class="member-card ${cardClass}">

            <!-- Name and verdict badge -->
            <div class="member-name">${member.name}</div>
            <span class="verdict-badge badge-${member.verdict}">${member.verdict}</span>

            <!-- Big suspicion score number -->
            <div class="score-number" style="color: ${scoreColor}">
              ${member.suspicionScore}
              <span style="font-size: 1rem; font-weight: 400; color: #555">/100</span>
            </div>
            <div class="score-label">Suspicion Score</div>

            <!-- Score progress bar -->
            <div class="score-bar-bg">
              <div class="score-bar ${barClass}" style="width: ${member.suspicionScore}%"></div>
            </div>

            <!-- Contribution stats -->
            <div class="stats">
              Commits: <span>${member.commits}</span> &nbsp;|&nbsp;
              Lines added: <span>${member.linesAdded}</span><br>
              Last commit: <span>${member.lastCommitTime}</span>
            </div>

            <!-- Kimi AI's one-line evidence -->
            <div class="evidence">🔍 ${member.evidence}</div>

            <!-- Red IMPOSTOR stamp (only shows on impostors) -->
            ${member.verdict === 'IMPOSTOR'
              ? '<div class="stamp show">IMPOSTOR</div>'
              : ''
            }
          </div>
        `;
      });

      html += `</div>

        <!-- Download button at the bottom -->
        <button class="download-btn" onclick="downloadReport()">
          📄 Download Evidence Dossier
        </button>
      `;

      document.getElementById('results').innerHTML = html;
    }

    // ============================================
    // DOWNLOAD FUNCTION
    // Grabs the text content of the results
    // and saves it as a .txt file
    // ============================================
    function downloadReport() {
      const content = document.getElementById('results').innerText;
      const blob = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'evidence-dossier.txt';
      a.click();
    }
  </script>

</body>
</html>
