<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔍 Freeloader Detective</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="header">
    <div class="crewmates">
      <span class="crewmate">🔵</span>
      <span class="crewmate">🔴</span>
      <span class="crewmate">🟢</span>
      <span class="crewmate">🟡</span>
    </div>
    <h1>🔍 Freeloader Detective</h1>
    <p class="subtitle">Among Us-style AI audit for group project freeloaders</p>
    <div class="sponsor-row">
      <span class="sponsor-pill">⚡ Daytona Sandbox</span>
      <span class="sponsor-pill">🌐 Bright Data</span>
      <span class="sponsor-pill">🔀 TokenRouter</span>
      <span class="sponsor-pill">🤖 Kimi AI Core</span>
    </div>
  </div>

  <div class="input-wrap">
    <input
      type="text"
      id="repoUrl"
      placeholder="Paste GitHub repo URL — e.g. https://github.com/team/project"
    />
    <button class="btn-investigate" id="analyzeBtn" onclick="analyze()">
      🔍 Investigate for Freeloaders
    </button>
  </div>

  <div class="status" id="status"></div>

  <div class="results" id="results"></div>

  <script src="dashboard.js"></script>

</body>
</html>
